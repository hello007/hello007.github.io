<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All For AI - AI 转型实践指南</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.8;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.3rem;
            opacity: 0.95;
            font-weight: 300;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            animation: fadeInUp 0.8s ease-out;
            animation-fill-mode: both;
        }

        .card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: block;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2d3748;
        }

        .card-desc {
            color: #718096;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .card-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            background: #e2e8f0;
            color: #4a5568;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            color: white;
            opacity: 0.9;
            margin-top: 40px;
            animation: fadeIn 1s ease-out;
            animation-delay: 0.6s;
            animation-fill-mode: both;
        }

        .footer a {
            color: white;
            text-decoration: underline;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 1.1rem;
            }

            .cards {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>All For AI</h1>
            <p>AI 转型实践指南与资源分享</p>
        </div>

        <div class="cards">
            <a href="./ai/AI转型启动会.html" class="card">
                <span class="card-icon">🎯</span>
                <h2 class="card-title">AI 转型启动会</h2>
                <p class="card-desc">
                    AI 转型项目的启动会议材料，用于团队宣贯和目标对齐，包含转型背景、目标设定和实施计划。
                </p>
                <div class="card-meta">
                    <span class="tag">启动材料</span>
                    <span class="tag">团队宣贯</span>
                    <span class="tag">目标对齐</span>
                </div>
            </a>
            <a href="./ai/团队向AI方向转型实操指南.html" class="card">
                <span class="card-icon">🚀</span>
                <h2 class="card-title">团队向 AI 方向转型实操指南</h2>
                <p class="card-desc">
                    详细的团队 AI 转型实施指南，包含转型策略、实施步骤、最佳实践等内容，帮助团队顺利实现 AI 转型。
                </p>
                <div class="card-meta">
                    <span class="tag">转型规划</span>
                    <span class="tag">实施指南</span>
                    <span class="tag">最佳实践</span>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>基于 <a href="https://pages.github.com/">GitHub Pages</a> 托管 | 使用 Jekyll 构建</p>
        </div>
    </div>
</body>
</html>
